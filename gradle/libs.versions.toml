[versions]
# Fabric (https://fabricmc.net/develop)
jdk = "25"
minecraft = "26.2"
fabric-loader = "0.19.3"
fabric-api = "0.153.0+26.2"

# Plugins
loom = "1.16-SNAPSHOT"

# Mods
baritone = "26.1-SNAPSHOT"
orbit = "0.2.4"
starscript = "0.2.5"
reflections = "0.10.2"
netty = "4.2.7.Final"
waybackauthlib = "1.1.0"

[libraries]
# Fabric base
minecraft = { module = "com.mojang:minecraft", version.ref = "minecraft" }
fabric-loader = { module = "net.fabricmc:fabric-loader", version.ref = "fabric-loader" }

# Mods
baritone = { module = "meteordevelopment:baritone", version.ref = "baritone" }

# Libraries
orbit = { module = "meteordevelopment:orbit", version.ref = "orbit" }
starscript = { module = "org.meteordev:starscript", version.ref = "starscript" }
reflections = { module = "org.reflections:reflections", version.ref = "reflections" }
netty-handler-proxy = { module = "io.netty:netty-handler-proxy", version.ref = "netty" }
netty-codec-socks = { module = "io.netty:netty-codec-socks", version.ref = "netty" }
waybackauthlib = { module = "de.florianreuth:waybackauthlib", version.ref = "waybackauthlib" }

[plugins]
fabric-loom = { id = "net.fabricmc.fabric-loom", version.ref = "loom" }
